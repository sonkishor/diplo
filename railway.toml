[[services]]
name = "web"

[services.deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"

[[services]]
name = "gdelt-scraper"

[services.deploy]
startCommand = "python manage.py pull_gdelt"
cronSchedule = "*/15 * * * *"
