[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
    "python3 -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npx ng build --configuration production",
    ". /opt/venv/bin/activate && python3 manage.py collectstatic --noinput"
]

[start]
cmd = "/opt/venv/bin/python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
